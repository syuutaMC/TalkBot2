version: '3.8'

services:
  # VOICEVOX Engine
  voicevox:
    image: voicevox/voicevox_engine:cpu-ubuntu20.04-latest
    container_name: voicevox_engine
    ports:
      - "50021:50021"
    environment:
      - TZ=Asia/Tokyo
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:50021/version"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Discord読み上げBot
  discord-bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: discord_talkbot
    depends_on:
      voicevox:
        condition: service_healthy
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - VOICEVOX_URL=http://voicevox:50021
      - TZ=Asia/Tokyo
    env_file:
      - ../.env
    restart: unless-stopped
    volumes:
      # 設定ファイルの永続化
      - ../config/config.json:/app/config.json
    networks:
      - bot-network

networks:
  bot-network:
    driver: bridge
