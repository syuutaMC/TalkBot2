services:
  # VOICEVOX Engine (GPU版)
  voicevox:
    image: voicevox/voicevox_engine:nvidia-ubuntu20.04-latest
    container_name: voicevox_engine
    privileged: true
    ports:
      - "50021:50021"
    environment:
      - TZ=Asia/Tokyo
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # healthcheck を無効化（起動に時間がかかるため）
    # healthcheck:
    #   test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:50021/version')"]
    #   interval: 15s
    #   timeout: 10s
    #   retries: 10
    #   start_period: 60s

  # Discord読み上げBot
  discord-bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: discord_talkbot
    depends_on:
      - voicevox
    environment:
      - VOICEVOX_URL=http://voicevox:50021
      - TZ=Asia/Tokyo
      # Prometheus マルチプロセスモード: メトリクスをファイル経由で共有する
      - PROMETHEUS_MULTIPROC_DIR=/app/prometheus_data
    env_file:
      - ../.env
    restart: unless-stopped
    volumes:
      # 設定ファイルの永続化
      - ../config:/app/config
      # Prometheus メトリクス共有ディレクトリ（ダッシュボードと共有）
      - prometheus_data:/app/prometheus_data

  # 監視ダッシュボード (http://localhost:8080)
  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dashboard
    container_name: talkbot2_dashboard
    depends_on:
      - voicevox
    ports:
      - "50022:8080"
    environment:
      - VOICEVOX_URL=http://voicevox:50021
      - DASHBOARD_PORT=8080
      - TZ=Asia/Tokyo
      # Prometheus マルチプロセスモード: Bot のメトリクスファイルを読み取る
      - PROMETHEUS_MULTIPROC_DIR=/app/prometheus_data
    restart: unless-stopped
    volumes:
      # Bot の設定ファイルを読み取り専用で共有
      - ../config:/app/config:ro
      # Prometheus メトリクス共有ディレクトリ（Bot と共有）
      - prometheus_data:/app/prometheus_data

  # Prometheus サーバー (http://localhost:9090)
  prometheus:
    image: prom/prometheus:latest
    container_name: talkbot2_prometheus
    depends_on:
      - dashboard
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_metrics:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    environment:
      - TZ=Asia/Tokyo
    restart: unless-stopped

  # Grafana ダッシュボード (http://localhost:3000)
  grafana:
    image: grafana/grafana:latest
    container_name: talkbot2_grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - TZ=Asia/Tokyo
    restart: unless-stopped

volumes:
  # Bot と dashboard が Prometheus メトリクスファイルを共有するための名前付きボリューム
  prometheus_data:
  # Prometheus の時系列データ保存用ボリューム
  prometheus_metrics:
  # Grafana のデータ保存用ボリューム
  grafana_data:
