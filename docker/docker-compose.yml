services:
  # VOICEVOX Engine (GPU版)
  voicevox:
    image: voicevox/voicevox_engine:nvidia-ubuntu20.04-latest
    container_name: voicevox_engine
    ports:
      - "50021:50021"
    environment:
      - TZ=Asia/Tokyo
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:50021/version"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # Discord読み上げBot
  discord-bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: discord_talkbot
    depends_on:
      voicevox:
        condition: service_healthy
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - VOICEVOX_URL=http://voicevox:50021
      - TZ=Asia/Tokyo
    env_file:
      - ../.env
    restart: unless-stopped
    volumes:
      # 設定ファイルの永続化
      - ../config/config.json:/app/config.json
